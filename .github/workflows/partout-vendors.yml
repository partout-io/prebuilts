name: Partout Vendors

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target to build
        required: false
        type: choice
        default: all
        options:
          - all
          - android-arm64-v8a
          - windows-x64
          - windows-arm64

permissions:
  contents: read

env:
  ANDROID_API: "28"
  ANDROID_NDK_VERSION: "30.0.14904198"
  LLVM_MINGW_VERSION: "20260616"
  LLVM_MINGW_FLAVOR: ucrt
  MSVC_RUNTIME_LIBRARY: MultiThreadedDLL
  NASM_VERSION: "3.01"
  NASM_SOURCE_SHA256: e0ba5157007abc7b1a65118a96657a961ddf55f7e3f632ee035366dfce039ca4

jobs:
  select-matrix:
    name: Select matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Select target matrix
        id: matrix
        shell: bash
        run: |
          target="${{ inputs.target }}"
          if [ -z "${target}" ]; then
            target="all"
          fi

          case "${target}" in
            all)
              matrix='{"include":[{"target":"android-arm64-v8a","runner":"ubuntu-24.04","build_host":"linux"},{"target":"windows-x64","runner":"windows-2022","build_host":"windows","llvm_mingw_host_arch":"x86_64","llvm_mingw_triple":"x86_64-w64-mingw32","llvm_mingw_sha256":"b9b68a4d276e16fa25802aaba458e4638f64b3884c290aaccdc2d87083b6ca35"},{"target":"windows-arm64","runner":"windows-2022","build_host":"windows","llvm_mingw_host_arch":"x86_64","llvm_mingw_triple":"aarch64-w64-mingw32","llvm_mingw_sha256":"b9b68a4d276e16fa25802aaba458e4638f64b3884c290aaccdc2d87083b6ca35"}]}'
              ;;
            android-arm64-v8a)
              matrix='{"include":[{"target":"android-arm64-v8a","runner":"ubuntu-24.04","build_host":"linux"}]}'
              ;;
            windows-x64)
              matrix='{"include":[{"target":"windows-x64","runner":"windows-2022","build_host":"windows","llvm_mingw_host_arch":"x86_64","llvm_mingw_triple":"x86_64-w64-mingw32","llvm_mingw_sha256":"b9b68a4d276e16fa25802aaba458e4638f64b3884c290aaccdc2d87083b6ca35"}]}'
              ;;
            windows-arm64)
              matrix='{"include":[{"target":"windows-arm64","runner":"windows-2022","build_host":"windows","llvm_mingw_host_arch":"x86_64","llvm_mingw_triple":"aarch64-w64-mingw32","llvm_mingw_sha256":"b9b68a4d276e16fa25802aaba458e4638f64b3884c290aaccdc2d87083b6ca35"}]}'
              ;;
            *)
              echo "Unknown target: ${target}" >&2
              exit 1
              ;;
          esac

          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

  build:
    name: ${{ matrix.target }}
    needs: select-matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix: ${{ fromJSON(needs.select-matrix.outputs.matrix) }}

    steps:
      - name: Check out prebuilts
        uses: actions/checkout@v7

      - name: Prepare Partout submodule
        shell: bash
        run: scripts/checkout-partout.sh

      - name: Set up Go from runner image
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache-dependency-path: partout/vendors/wg-go/go.sum

      - name: Select Android NDK
        if: startsWith(matrix.target, 'android-')
        shell: bash
        run: |
          ndk_dir="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          if [ ! -d "${ndk_dir}" ]; then
            sdkmanager_bin="$(command -v sdkmanager || true)"
            if [ -z "${sdkmanager_bin}" ]; then
              sdkmanager_bin="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
            fi
            set +o pipefail
            yes | "${sdkmanager_bin}" --install "ndk;${ANDROID_NDK_VERSION}"
            set -o pipefail
          fi
          echo "ANDROID_NDK_ROOT=${ndk_dir}" >> "${GITHUB_ENV}"

      - name: Restore llvm-mingw cache
        id: llvm-mingw-cache
        if: matrix.build_host == 'windows'
        uses: actions/cache/restore@v6.1.0
        with:
          path: ${{ runner.tool_cache }}/llvm-mingw/${{ env.LLVM_MINGW_VERSION }}-${{ env.LLVM_MINGW_FLAVOR }}-${{ matrix.llvm_mingw_host_arch }}
          key: llvm-mingw-windows-${{ matrix.target }}-${{ env.LLVM_MINGW_VERSION }}-${{ env.LLVM_MINGW_FLAVOR }}-${{ matrix.llvm_mingw_sha256 }}

      - name: Set up llvm-mingw for wg-go
        if: matrix.build_host == 'windows'
        shell: pwsh
        run: |
          $archive = "llvm-mingw-$env:LLVM_MINGW_VERSION-$env:LLVM_MINGW_FLAVOR-${{ matrix.llvm_mingw_host_arch }}.zip"
          $toolRoot = Join-Path (Join-Path $env:RUNNER_TOOL_CACHE "llvm-mingw") "$env:LLVM_MINGW_VERSION-$env:LLVM_MINGW_FLAVOR-${{ matrix.llvm_mingw_host_arch }}"
          $clang = Join-Path $toolRoot "bin\${{ matrix.llvm_mingw_triple }}-clang.exe"

          if (-not (Test-Path $clang)) {
            New-Item -ItemType Directory -Force $toolRoot | Out-Null

            $archivePath = Join-Path $env:RUNNER_TEMP $archive
            $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/$env:LLVM_MINGW_VERSION/$archive"
            Invoke-WebRequest -Uri $url -OutFile $archivePath

            $actualSha256 = (Get-FileHash -Algorithm SHA256 $archivePath).Hash.ToLowerInvariant()
            if ($actualSha256 -ne "${{ matrix.llvm_mingw_sha256 }}") {
              throw "Expected llvm-mingw SHA256 ${{ matrix.llvm_mingw_sha256 }}, got $actualSha256"
            }

            $extractRoot = Join-Path $env:RUNNER_TEMP "llvm-mingw-${{ matrix.llvm_mingw_host_arch }}"
            Remove-Item -Recurse -Force $extractRoot -ErrorAction SilentlyContinue
            Expand-Archive -Path $archivePath -DestinationPath $extractRoot -Force
            $expandedRoot = Get-ChildItem -Path $extractRoot -Directory | Select-Object -First 1
            if (-not $expandedRoot) {
              throw "Unable to find extracted llvm-mingw root in $extractRoot"
            }
            Copy-Item -Recurse -Force (Join-Path $expandedRoot.FullName "*") $toolRoot
          }

          if (-not (Test-Path $clang)) {
            throw "Missing expected llvm-mingw clang: $clang"
          }

          "LLVM_MINGW_ROOT=$toolRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & $clang --version

      - name: Save llvm-mingw cache
        if: matrix.build_host == 'windows' && steps.llvm-mingw-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6.1.0
        with:
          path: ${{ runner.tool_cache }}/llvm-mingw/${{ env.LLVM_MINGW_VERSION }}-${{ env.LLVM_MINGW_FLAVOR }}-${{ matrix.llvm_mingw_host_arch }}
          key: ${{ steps.llvm-mingw-cache.outputs.cache-primary-key }}

      - name: Restore NASM cache
        id: nasm-cache
        if: matrix.build_host == 'windows'
        uses: actions/cache/restore@v6.1.0
        with:
          path: ${{ runner.tool_cache }}/nasm/${{ env.NASM_VERSION }}
          key: nasm-windows-${{ matrix.target }}-${{ env.NASM_VERSION }}-${{ env.NASM_SOURCE_SHA256 }}

      - name: Set up NASM for OpenSSL
        if: matrix.build_host == 'windows'
        shell: pwsh
        run: |
          $nasmRoot = Join-Path (Join-Path $env:RUNNER_TOOL_CACHE "nasm") $env:NASM_VERSION
          $nasmBin = Join-Path $nasmRoot ("nasm-" + $env:NASM_VERSION)
          $nasmExe = Join-Path $nasmBin "nasm.exe"

          if (-not (Test-Path $nasmExe)) {
            New-Item -ItemType Directory -Force $nasmRoot | Out-Null

            $archive = Join-Path $env:RUNNER_TEMP ("nasm-" + $env:NASM_VERSION + "-win64.zip")
            $url = "https://www.nasm.us/pub/nasm/releasebuilds/" + $env:NASM_VERSION + "/win64/nasm-" + $env:NASM_VERSION + "-win64.zip"
            Invoke-WebRequest -Uri $url -OutFile $archive

            $actualSha256 = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
            if ($actualSha256 -ne $env:NASM_SOURCE_SHA256) {
              throw "Expected NASM SHA256 $env:NASM_SOURCE_SHA256, got $actualSha256"
            }

            Expand-Archive -Path $archive -DestinationPath $nasmRoot -Force
          }

          $env:PATH = "$nasmBin;$env:PATH"
          Add-Content -Path $env:GITHUB_PATH -Value $nasmBin
          nasm -v

      - name: Save NASM cache
        if: matrix.build_host == 'windows' && steps.nasm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6.1.0
        with:
          path: ${{ runner.tool_cache }}/nasm/${{ env.NASM_VERSION }}
          key: ${{ steps.nasm-cache.outputs.cache-primary-key }}

      - name: Build Linux-hosted vendors for ${{ matrix.target }}
        if: matrix.build_host == 'linux'
        shell: bash
        run: scripts/build-partout-vendors.sh "${{ matrix.target }}"

      - name: Build Windows-hosted vendors for ${{ matrix.target }}
        if: matrix.build_host == 'windows'
        shell: pwsh
        run: scripts/build-partout-vendors-windows.ps1 -Target "${{ matrix.target }}"

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: partout-vendors-${{ matrix.target }}
          path: artifacts/*
          if-no-files-found: error
